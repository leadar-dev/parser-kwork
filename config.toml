[kwork]
base_url = "https://kwork.ru"
request_delay = 1.5
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
cookies = ""

[logging]
level = "INFO"

[rabbitmq]
url = "amqp://guest:guest@localhost/"   # в проде: RABBITMQ__URL=amqp://...

[dragonfly]
url = "redis://localhost:6379"          # в проде: DRAGONFLY__URL=redis://...
dedup_ttl_days = 7

[parser]
interval = 60
